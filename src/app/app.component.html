<div class="h-screen flex flex-col overflow-hidden"
     style="background: radial-gradient(ellipse at 50% 0%, #2d1408 0%, #160b02 60%);">

  <!-- Header -->
  <header class="text-center pt-4 pb-2 px-4 shrink-0">
    <h1 class="font-gothic leading-none" style="font-size:2.8rem; color:#c9a227; text-shadow: 0 2px 12px #00000099, 0 0 30px #c9a22733;">
      Dartaway
    </h1>
    <p class="font-fell italic mt-1 text-sm" style="color:#c9a87c; letter-spacing:0.04em;">
      ✦ Que la fléchette du destin guide ton voyage, noble voyageur ✦
    </p>
    <div class="mt-1" style="height:1px; background: linear-gradient(90deg, transparent, #c9a22755, transparent);"></div>
  </header>

  <!-- Lance button -->
  <div class="flex justify-center py-2 shrink-0">
    <button
      class="btn-medieval px-8 py-2.5 rounded text-sm"
      [disabled]="!isIdle"
      (click)="throwDart()"
    >
      @if (isIdle) {
        ⚔️&nbsp; Lancer la Fléchette &nbsp;⚔️
      } @else {
        <span style="opacity:0.7;" class="animate-pulse">✦ En vol vers les terres lointaines... ✦</span>
      }
    </button>
  </div>

  <!-- Map — parchemin -->
  <div class="flex-1 mx-4 mb-4 min-h-0 overflow-hidden"
       style="border-radius:4px; border: 3px solid #8b6914;
              box-shadow: 0 0 0 1px #3a200888, 0 8px 40px #00000088, inset 0 0 20px #00000040;">
    <app-world-map
      class="block w-full h-full"
      [targetCountry]="selectedCountry"
      [animationPhase]="animationPhase"
      (dartLanded)="onDartLanded()"
    />
  </div>

</div>

<!-- Modal -->
@if (showModal && selectedCountry) {
  <app-result-modal
    [country]="selectedCountry"
    [weather]="weatherResult"
    [isLoadingWeather]="isLoadingWeather"
    [isLoadingMessage]="isLoadingMessage"
    [slackMessage]="slackMessage"
    (closed)="closeModal()"
    (relaunch)="relaunch()"
  />
}
